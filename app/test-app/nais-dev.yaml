apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: rust-nais-api-test
  namespace: paw
  labels:
    team: paw
spec:
  image: {{ image }}
  ingresses:
    - https://intern-rust-testing-arbeidssoekerregisteret.intern.dev.nav.no
  port: 8080
  replicas:
    min: 1
    max: 1
  env:
    - name: RUST_BACKTRACE
      value: "1"
    - name: PGSSLMODE
      value: "VerifyFull"
    - name: PGSSLROOTCERT
      value: "$(NAIS_DATABASE_RUST_NAIS_API_TEST_RUST_TEST_APP_SSLROOTCERT)"
    - name: PGSSLCERT
      value: "$(NAIS_DATABASE_RUST_NAIS_API_TEST_RUST_TEST_APP_SSLCERT)"
    - name: PGSSLKEY
      value: "$(NAIS_DATABASE_RUST_NAIS_API_TEST_RUST_TEST_APP_SSLKEY)"
  liveness:
    path: /internal/isAlive
    initialDelay: 10
  readiness:
    path: /internal/isReady
    initialDelay: 10
  startup:
    failureThreshold: 10
    initialDelay: 2
    path: /internal/hasStarted
    periodSeconds: 10
    timeout: 5
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    tracing:
      enabled: true
  kafka:
    pool: nav-dev
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        tier: db-f1-micro
        databases:
          - name: rust-test-app
  resources:
    limits:
      memory: 8Mi
    requests:
      memory: 8Mi
      cpu: 1m
  accessPolicy:
    inbound:
      rules:
       - application: paw-dev-proxy
  