{
  "openapi": "3.1.0",
  "info": {
    "title": "PAW Arbeidssøkerregisteret Oversikt API",
    "description": "API for å hente oversikt over arbeidssøkere. Kalles av saksbehandlere via Azure AD.",
    "version": "1.0.0"
  },
  "paths": {
    "/api/v1/oversikt": {
      "post": {
        "tags": [
          "oversikt"
        ],
        "operationId": "finn_oversikt",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/QueryRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Oversikt over arbeidssøkere for gitt identitetsnummer",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/OversiktResponse"
                }
              }
            }
          },
          "500": {
            "description": "Intern feil",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "Arbeidssoeker": {
        "type": "object",
        "required": [
          "arbeidssoeker_id",
          "identitetsnummer",
          "fornavn",
          "etternavn",
          "periode",
          "bekreftelse_paa_vegne_av",
          "tilknyttet_kontor"
        ],
        "properties": {
          "arbeidssoeker_id": {
            "type": "integer",
            "format": "int64"
          },
          "bekreftelse": {
            "oneOf": [
              {
                "type": "null"
              },
              {
                "$ref": "#/components/schemas/Bekreftelse"
              }
            ]
          },
          "bekreftelse_paa_vegne_av": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/Bekreftelsesloesning"
            }
          },
          "egenvurdering": {
            "oneOf": [
              {
                "type": "null"
              },
              {
                "$ref": "#/components/schemas/Egenvurdering"
              }
            ]
          },
          "etternavn": {
            "type": "string"
          },
          "fornavn": {
            "type": "string"
          },
          "identitetsnummer": {
            "type": "string"
          },
          "ledig_siden": {
            "type": [
              "string",
              "null"
            ],
            "format": "date-time"
          },
          "mellomnavn": {
            "type": [
              "string",
              "null"
            ]
          },
          "opplysninger": {
            "oneOf": [
              {
                "type": "null"
              },
              {
                "$ref": "#/components/schemas/Opplysninger"
              }
            ]
          },
          "periode": {
            "$ref": "#/components/schemas/Periode"
          },
          "profilering": {
            "oneOf": [
              {
                "type": "null"
              },
              {
                "$ref": "#/components/schemas/Profilering"
              }
            ]
          },
          "tilknyttet_kontor": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/TilknyttetKontor"
            }
          }
        }
      },
      "Bekreftelse": {
        "type": "object",
        "required": [
          "id",
          "gjelder_fra",
          "gjelder_til",
          "har_jobbet",
          "vil_fortsette",
          "bekreftelsesloesning"
        ],
        "properties": {
          "bekreftelsesloesning": {
            "$ref": "#/components/schemas/Bekreftelsesloesning"
          },
          "gjelder_fra": {
            "type": "string",
            "format": "date-time"
          },
          "gjelder_til": {
            "type": "string",
            "format": "date-time"
          },
          "har_jobbet": {
            "type": "boolean"
          },
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "vil_fortsette": {
            "type": "boolean"
          }
        }
      },
      "Bekreftelsesloesning": {
        "type": "string",
        "enum": [
          "UKJENT_VERDI",
          "ARBEIDSSOEKERREGISTERET",
          "DAGPENGER",
          "FRISKMELDT_TIL_ARBEIDSFORMIDLING"
        ]
      },
      "Egenvurdering": {
        "type": "object",
        "required": [
          "id",
          "egenvurdert_til",
          "tidspunkt"
        ],
        "properties": {
          "egenvurdert_til": {
            "$ref": "#/components/schemas/ProfilertTil"
          },
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "tidspunkt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "Opplysninger": {
        "type": "object",
        "required": [
          "id",
          "tidspunkt"
        ],
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "tidspunkt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "OversiktResponse": {
        "type": "object",
        "required": [
          "arbeidssoekere",
          "paging"
        ],
        "properties": {
          "arbeidssoekere": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/Arbeidssoeker"
            }
          },
          "paging": {
            "$ref": "#/components/schemas/PagingResponse"
          }
        }
      },
      "PagingRequest": {
        "type": "object",
        "required": [
          "page",
          "page_size",
          "sort_order"
        ],
        "properties": {
          "page": {
            "type": "integer",
            "format": "int32"
          },
          "page_size": {
            "type": "integer",
            "format": "int32"
          },
          "sort_order": {
            "$ref": "#/components/schemas/SortOrder"
          }
        }
      },
      "PagingResponse": {
        "type": "object",
        "required": [
          "page",
          "page_size",
          "total_items",
          "sort_order"
        ],
        "properties": {
          "page": {
            "type": "integer",
            "format": "int32"
          },
          "page_size": {
            "type": "integer",
            "format": "int32"
          },
          "sort_order": {
            "$ref": "#/components/schemas/SortOrder"
          },
          "total_items": {
            "type": "integer",
            "format": "int64"
          }
        }
      },
      "Periode": {
        "type": "object",
        "required": [
          "id",
          "startet"
        ],
        "properties": {
          "avsluttet": {
            "type": [
              "string",
              "null"
            ],
            "format": "date-time"
          },
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "startet": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "ProblemDetails": {
        "type": "object",
        "required": [
          "id",
          "type",
          "title",
          "status",
          "instance",
          "timestamp"
        ],
        "properties": {
          "detail": {
            "type": [
              "string",
              "null"
            ]
          },
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "instance": {
            "type": "string"
          },
          "status": {
            "type": "integer",
            "format": "int32",
            "minimum": 0
          },
          "timestamp": {
            "type": "string",
            "format": "date-time"
          },
          "title": {
            "type": "string"
          },
          "type": {
            "type": "string"
          }
        }
      },
      "Profilering": {
        "type": "object",
        "required": [
          "id",
          "profilert_til",
          "tidspunkt"
        ],
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "profilert_til": {
            "$ref": "#/components/schemas/ProfilertTil"
          },
          "tidspunkt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "ProfilertTil": {
        "type": "string",
        "enum": [
          "UDEFINERT",
          "ANTATT_GODE_MULIGHETER",
          "ANTATT_BEHOV_FOR_VEILEDNING",
          "OPPGITT_HINDRINGER",
          "UKJENT_VERDI"
        ]
      },
      "QueryRequest": {
        "type": "object",
        "required": [
          "identitetsnummer"
        ],
        "properties": {
          "identitetsnummer": {
            "type": "string"
          },
          "paging": {
            "oneOf": [
              {
                "type": "null"
              },
              {
                "$ref": "#/components/schemas/PagingRequest"
              }
            ]
          }
        }
      },
      "SortOrder": {
        "type": "string",
        "enum": [
          "ASC",
          "DESC"
        ]
      },
      "TilknyttetKontor": {
        "type": "object",
        "required": [
          "kontor_id",
          "kontor_navn",
          "kontor_type"
        ],
        "properties": {
          "kontor_id": {
            "type": "string"
          },
          "kontor_navn": {
            "type": "string"
          },
          "kontor_type": {
            "type": "string"
          }
        }
      }
    }
  },
  "tags": [
    {
      "name": "oversikt",
      "description": "Henting av arbeidssøkeroversikt"
    }
  ]
}