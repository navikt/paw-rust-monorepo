apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: paw-arbeidssoekerregisteret-api-kartlegging
  namespace: paw
  labels:
    team: paw
spec:
  image: {{ image }}
  port: 8080
  ingresses:
    - https://kartlegging-arbeidssoekerregisteret.intern.dev.nav.no
  env:
    - name: RUST_BACKTRACE
      value: "1"
    - name: RUST_LOG
      value: "INFO"
    - name: PGSSLMODE
      value: "VerifyFull"
    - name: PGSSLROOTCERT
      value: "$(NAIS_DATABASE_PAW_ARBEIDSSOEKERREGISTERET_API_KARTLEGGING_KARTLEGGING_SSLROOTCERT)"
    - name: PGSSLCERT
      value: "$(NAIS_DATABASE_PAW_ARBEIDSSOEKERREGISTERET_API_KARTLEGGING_KARTLEGGING_SSLCERT)"
    - name: PGSSLKEY
      value: "$(NAIS_DATABASE_PAW_ARBEIDSSOEKERREGISTERET_API_KARTLEGGING_KARTLEGGING_SSLKEY)"
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      memory: 32Mi
    requests:
      cpu: 25m
      memory: 32Mi
  startup:
    failureThreshold: 10
    initialDelay: 2
    path: /internal/hasStarted
    periodSeconds: 10
    timeout: 5
  liveness:
    path: /internal/isAlive
    initialDelay: 10
  readiness:
    path: /internal/isReady
    initialDelay: 10
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  azure:
    application:
      enabled: true
      allowAllUsers: true
      claims:
        extra:
          - NAVident
  kafka:
    pool: nav-dev
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        tier: db-f1-micro
        databases:
          - name: kartlegging
  accessPolicy:
    outbound:
      rules:
        - application: paw-kafka-key-generator
      external:
        - host: pdl-api.dev-fss-pub.nais.io
    inbound:
      rules:
        - application: azure-token-generator
          namespace: nais
        - application: paw-dev-proxy
        - application: arbeidssokerregistrering-for-veileder
