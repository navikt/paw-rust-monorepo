schema {
    query: Query
}

"Marks the field, argument, input field or enum value as deprecated"
directive @deprecated(
    "The reason for the deprecation"
    reason: String! = "No longer supported"
) on FIELD_DEFINITION | ARGUMENT_DEFINITION | ENUM_VALUE | INPUT_FIELD_DEFINITION

"This directive disables error propagation when a non nullable field returns null for the given operation."
directive @experimental_disableErrorPropagation on QUERY | MUTATION | SUBSCRIPTION

"Directs the executor to include this field or fragment only when the `if` argument is true"
directive @include(
    "Included when true."
    if: Boolean!
) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT

"Indicates an Input Object is a OneOf Input Object."
directive @oneOf on INPUT_OBJECT

"Directs the executor to skip this field or fragment when the `if` argument is true."
directive @skip(
    "Skipped when true."
    if: Boolean!
) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT

"Exposes a URL that specifies the behaviour of this scalar."
directive @specifiedBy(
    "The URL that specifies the behaviour of this scalar."
    url: String!
) on SCALAR

type AlleKontorQueryDto {
    kontorId: String!
    kontorNavn: String!
}

type ArbeidsoppfolgingKontorDto {
    kontorId: String!
    kontorNavn: String!
}

type ArenaKontorDto {
    kontorId: String!
    kontorNavn: String!
}

type GeografiskTilknyttetKontorDto {
    kontorId: String!
    kontorNavn: String!
}

type KontorHistorikkQueryDto {
    endretAv: String!
    endretAvType: String!
    endretTidspunkt: String!
    endringsType: KontorEndringsType!
    ident: String!
    kontorId: String!
    kontorNavn: String
    kontorType: KontorType!
}

type KontorTilhorighetQueryDto {
    kontorId: String!
    kontorNavn: String!
    kontorType: KontorType!
    registrant: String!
    registrantType: RegistrantTypeDto!
}

type KontorTilhorigheterQueryDto {
    arbeidsoppfolging: ArbeidsoppfolgingKontorDto
    arena: ArenaKontorDto
    geografiskTilknytning: GeografiskTilknyttetKontorDto
}

type Query {
    alleKontor(ident: String): [AlleKontorQueryDto!]!
    kontorHistorikk(ident: String!): [KontorHistorikkQueryDto!]!
    kontorTilhorighet(ident: String!): KontorTilhorighetQueryDto
    kontorTilhorigheter(ident: String!): KontorTilhorigheterQueryDto!
}

